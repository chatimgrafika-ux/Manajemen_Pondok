    const Award = (props) => <IconWrapper name="ph-medal" {...props} />;
    const School = (props) => <IconWrapper name="ph-buildings" {...props} />;
    const Briefcase = (props) => <IconWrapper name="ph-briefcase" {...props} />;
    const Loader2 = (props) => <IconWrapper name="ph-spinner ph-spin" {...props} />;
    const Menu = (props) => <IconWrapper name="ph-list" {...props} />;
    const AlertTriangle = (props) => <IconWrapper name="ph-warning" {...props} />;
    const EditIcon = (props) => <IconWrapper name="ph-pencil-simple" {...props} />;

    // ==========================================
    // MOCK DATA (Digunakan sementara jika belum konek API)
    // ==========================================
    const mockSantri = [

        nipd: "-", nisn: "-", status: "Aktif", jenjang: "SD",
        halaqoh: "-", dapodik: "Belum Terdaftar", musyrif: "-",
        tahunMasuk: "2025", registrasi: "Belum Selesai", kelas: "I - A",
        sppBulanan: "Rp 350.000", jenisKelamin: "PUTRI", ttl: "Ternate / 12-05-2015", nik: "-", agama: "Islam",
        kontak: { wa: "-", email: "-", alamat: "-", desa: "-", kecamatan: "-", kabupaten: "-" },
        asalSekolah: { nama: "-", npsn: "-", alamat: "-", kecamatan: "-", kabupaten: "-", provinsi: "-" },
        fisik: { bb: "-", tb: "-", baju: "-", celana: "-", topi: "-" },
        keluarga: {

          ibu: { nama: "-", ttl: "-", nik: "-", pekerjaan: "-", pendidikan: "-", hp: "-", penghasilan: "-" },
          wali: { nama: "-", ttl: "-", nik: "-", pekerjaan: "-", pendidikan: "-", hp: "-", penghasilan: "-" }
        },

        tahfizh: { juz: "Juz 30 & 29", suratTerakhir: "Al-Mulk", kualitas: "Jayyid Jiddan", prestasi: "Juara Harapan 1 MHQ Tingkat Yayasan" },
        pembayaran: [{ bulanKe: 1, tanggal: "8/8/2025", nominal: "Rp350.000", status: "Lunas" }]
      }
    ];

    const mockKelas = [
      { id: "KL-01", nama: "I - A", jenjang: "SD", waliKelas: "Ustadzah Fatimah", jumlahSantri: 28 },
      { id: "KL-02", nama: "I - B", jenjang: "SD", waliKelas: "Ustadzah Aisyah", jumlahSantri: 26 },
      { id: "KL-03", nama: "VII - PUTRA", jenjang: "SMP", waliKelas: "Ustadz Ali", jumlahSantri: 32 },
    ];

    const mockHalaqoh = [
      { id: "HL-01", nama: "Halaqoh Utsman", jenjang: "SD", musyrif: "Abdillah A Samsudin", jumlahSantri: 10 },
      { id: "HL-02", nama: "Halaqoh Ali", jenjang: "SD", musyrif: "Ustadz Umar", jumlahSantri: 12 },
      { id: "HL-03", nama: "Halaqoh Abu Bakar", jenjang: "SMP", musyrif: "Ustadz Hamzah", jumlahSantri: 15 },
    ];

    const mockPengajar = [
      {
        id: "PPTQH0001",
        nuptk: "-", namaLengkap: "Abdillah A Samsudin", jenisKelamin: "Laki-Laki", nik: "-", umur: "-", ttl: "- / -",
        kontak: { wa: "082248471007", email: "abdillahsamsudin6@gmail.com", alamat: "-", desa: "-", kelurahan: "-", kecamatan: "-", kota: "-" },
        kepegawaian: { jabatan: "Guru / Musyrif", sk: "-", guruMapel: "-", musyrifKamar: "-", musyrifHalaqoh: "Halaqoh Utsman" },
        profil: { hobi: "-", keahlian: "-" },
        pendidikan: { sd: "-", smp: "-", sma: "-", s1: "-", s2: "-", s3: "-" }
      }
    ];

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4FBfjgKIoSoXmqYw52M7QX_K-8ljDCG3L3sauNt2PbOKYy2pv8NBZKcThZr3V8zk3yw/exec";

    // ==========================================
    // MAIN COMPONENT
    // ==========================================
    function App() {
      const [activeMenu, setActiveMenu] = useState('data-santri');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      
      const [selectedSantri, setSelectedSantri] = useState(null);
      const [selectedPengajar, setSelectedPengajar] = useState(null);
      
      const [dataSantri, setDataSantri] = useState(mockSantri);
      const [dataKelas, setDataKelas] = useState(mockKelas);
      const [dataHalaqoh, setDataHalaqoh] = useState(mockHalaqoh);
      const [dataPengajar, setDataPengajar] = useState(mockPengajar);
      const [isLoading, setIsLoading] = useState(false);

      const [dialog, setDialog] = useState({ isOpen: false, type: 'info', title: '', message: '', onConfirm: null });

      const showMessage = (title, message, type = 'info') => setDialog({ isOpen: true, type, title, message, onConfirm: null });
      const showConfirm = (title, message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
      const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));

      const fetchData = async () => {
        setIsLoading(true);
        try {
          if (GOOGLE_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbw4FBfjgKIoSoXmqYw52M7QX_K-8ljDCG3L3sauNt2PbOKYy2pv8NBZKcThZr3V8zk3yw/exec") {
            setTimeout(() => setIsLoading(false), 800);
            return;
          }
          const response = await fetch(`${GOOGLE_SCRIPT_URL}?sheet=all`);
          const result = await response.json();
          if (result.status === 'success') {
            console.log("Data tersinkronisasi.", result.data);
            // Logic mapping data JSON ke state disini
          }
        } catch (error) {
          showMessage("Error Sinkronisasi", "Gagal mengambil data dari server. Periksa koneksi Anda.", "error");
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
      }, []);

      const handleDeleteData = (sheetName, id) => {
        showConfirm("Hapus Data", `Anda yakin ingin menghapus data ${id}? Tindakan ini akan menghapus data dari seluruh tabel terkait.`, async () => {
          setIsLoading(true);
          try {
            if (GOOGLE_SCRIPT_URL !== "https://script.google.com/macros/s/AKfycbw4FBfjgKIoSoXmqYw52M7QX_K-8ljDCG3L3sauNt2PbOKYy2pv8NBZKcThZr3V8zk3yw/exec") {
              await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST", body: JSON.stringify({ action: "multi_delete", id: id })
              });
            }
            // Simulasi lokal
            setDataSantri(prev => prev.filter(s => s.id !== id));
            setSelectedSantri(null);
            showMessage("Terhapus", "Data berhasil dihapus dari sistem.", "success");
          } catch (error) {
            showMessage("Gagal", "Gagal menghapus data.", "error");
          }
          setIsLoading(false);
        });
      };

        'data-santri': 'Data Santri', 'akademik': 'Akademik', 'ortu': 'Informasi Orang Tua',
        'tahfizh': 'Tahfizh & Prestasi', 'keuangan': 'Keuangan', 'kelas-halaqoh': 'Manajemen Kelas & Halaqoh',
        'pengajar': 'Manajemen Pengajar'
      };

      const filteredSantri = useMemo(() => {
        return dataSantri.filter(s => s.namaLengkap.toLowerCase().includes(searchQuery.toLowerCase()) || s.id.toLowerCase().includes(searchQuery.toLowerCase()));
      }, [searchQuery, dataSantri]);

      const filteredPengajar = useMemo(() => {
        return dataPengajar.filter(p => p.namaLengkap.toLowerCase().includes(searchQuery.toLowerCase()) || p.id.toLowerCase().includes(searchQuery.toLowerCase()));
      }, [searchQuery, dataPengajar]);

      const SidebarItem = ({ icon: Icon, label, id }) => (
        <button 
          onClick={() => { 
            setActiveMenu(id); setSelectedSantri(null); setSelectedPengajar(null); 
            if (window.innerWidth < 1024) setIsSidebarOpen(false); 
          }}
          className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${
            activeMenu === id ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'
          }`}
        >
          <Icon size={20} />
          <span className="font-medium">{label}</span>
        </button>
      );

              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 mt-6 px-2">Monitoring</p>
              <SidebarItem icon={Award} label="Tahfizh & Prestasi" id="tahfizh" />
              <SidebarItem icon={Wallet} label="Keuangan SPP" id="keuangan" />
              
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 mt-6 px-2">Manajemen Internal</p>
              <SidebarItem icon={School} label="Kelas & Halaqoh" id="kelas-halaqoh" />

                </div>
                <div>
                  <p className="text-sm font-medium">Admin Pusat</p>
                  <p className="text-xs text-slate-400">Superadmin</p>
                </div>

                </button>
                <h2 className="text-xl lg:text-2xl font-bold text-slate-800 capitalize hidden sm:block">
                  {menuTitles[activeMenu]}
                </h2>
              </div>
              
              <div className="flex items-center space-x-3 lg:space-x-4 w-full sm:w-auto justify-end">

                {/* Tombol Tambah Baru sekarang langsung mengarahkan pengguna

                */}

                      </h3>
                      <button className="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors">+ Kelas</button>

                            <th className="p-4 font-semibold text-center sticky top-0 bg-white z-10">Santri</th>
                          </tr>
                        </thead>
                        <tbody>
                          {dataKelas.map((kelas) => (

                    </div>
                    <div className="overflow-x-auto overflow-y-auto flex-1 p-2">

                              <th className="p-5 font-semibold">Kelas & Halaqoh</th>
                              <th className="p-5 font-semibold">Status</th>

                          )}
                          {activeMenu === 'akademik' && (
                            <React.Fragment>
                              <th className="p-5 font-semibold">Nama Lengkap</th>
                              <th className="p-5 font-semibold">NISN / Dapodik</th>
                              <th className="p-5 font-semibold">Kelas & Halaqoh</th>
                              <th className="p-5 font-semibold">Asal Sekolah</th>

                          {activeMenu === 'tahfizh' && (
                            <React.Fragment>
                              <th className="p-5 font-semibold">Nama Lengkap</th>
                              <th className="p-5 font-semibold">Kelas / Halaqoh</th>
                              <th className="p-5 font-semibold">Capaian Hafalan</th>
                              <th className="p-5 font-semibold">Prestasi Terakhir</th>
                            </React.Fragment>
                          )}
                          {activeMenu === 'keuangan' && (
                            <React.Fragment>
                              <th className="p-5 font-semibold">ID / NIPD</th>
                              <th className="p-5 font-semibold">Nama Lengkap</th>
                              <th className="p-5 font-semibold">SPP Bulanan</th>
                              <th className="p-5 font-semibold">Status Pembayaran</th>
                            </React.Fragment>
                          )}
                          <th className="p-5 font-semibold text-center">Aksi</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredSantri.map((santri) => (
                          <tr key={santri.id} className="border-b border-slate-100 hover:bg-emerald-50/30 transition-colors group">
                            {activeMenu === 'data-santri' && (
                              <React.Fragment>
                                <td className="p-5 text-sm font-medium text-slate-500">{santri.id}</td>
                                <td className="p-5 text-sm">
                                  <p className="font-bold text-slate-800">{santri.namaLengkap}</p>
                                  <p className="text-xs text-slate-500 mt-0.5">{santri.jenjang} • {santri.jenisKelamin}</p>
                                </td>
                                <td className="p-5 text-sm text-slate-600">
                                  <span className="block font-medium">{santri.kelas}</span>
                                  <span className="text-xs text-slate-500">{santri.halaqoh}</span>
                                </td>
                                <td className="p-5 text-sm">
                                  <span className={`px-3 py-1 rounded-full text-xs font-bold border ${
                                    santri.status === 'Aktif' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-red-50 text-red-700 border-red-200'
                                  }`}>
                                    {santri.status}
                                  </span>
                                </td>
                              </React.Fragment>
                            )}
                            {activeMenu === 'akademik' && (
                              <React.Fragment>
                                <td className="p-5 text-sm font-bold text-slate-800">{santri.namaLengkap}</td>
                                <td className="p-5 text-sm text-slate-600">
                                  <span className="block font-medium">NISN: {santri.nisn}</span>
                                  <span className="text-xs text-slate-500">{santri.dapodik}</span>
                                </td>
                                <td className="p-5 text-sm text-slate-600">
                                  <span className="block">{santri.kelas}</span>
                                  <span className="text-xs text-slate-500">{santri.halaqoh}</span>
                                </td>
                                <td className="p-5 text-sm text-slate-600">{santri.asalSekolah?.nama || '-'}</td>
                              </React.Fragment>
                            )}
                            {activeMenu === 'ortu' && (
                              <React.Fragment>
                                <td className="p-5 text-sm font-bold text-slate-800">{santri.namaLengkap}</td>
                                <td className="p-5 text-sm text-slate-600">
                                  <span className="block font-medium text-slate-800">{santri.keluarga?.ayah?.nama || '-'}</span>
                                  <span className="text-xs text-blue-600">{santri.keluarga?.ayah?.hp || '-'}</span>
                                </td>
                                <td className="p-5 text-sm text-slate-600">
                                  <span className="block font-medium text-slate-800">{santri.keluarga?.ibu?.nama || '-'}</span>
                                  <span className="text-xs text-blue-600">{santri.keluarga?.ibu?.hp || '-'}</span>
                                </td>
                                <td className="p-5 text-sm text-slate-600">{santri.keluarga?.wali?.nama || '-'}</td>
                              </React.Fragment>
                            )}
                            {activeMenu === 'tahfizh' && (
                              <React.Fragment>
                                <td className="p-5 text-sm font-bold text-slate-800">{santri.namaLengkap}</td>
                                <td className="p-5 text-sm text-slate-600">
                                  <span className="block">{santri.kelas}</span>
                                  <span className="text-xs text-slate-500">{santri.halaqoh}</span>
                                </td>
                                <td className="p-5 text-sm font-bold text-emerald-600">{santri.tahfizh?.juz || '-'}</td>
                                <td className="p-5 text-sm text-slate-600">{santri.tahfizh?.prestasi || '-'}</td>
                              </React.Fragment>
                            )}
                            {activeMenu === 'keuangan' && (
                              <React.Fragment>
                                <td className="p-5 text-sm font-medium text-slate-500">{santri.id}</td>
                                <td className="p-5 text-sm font-bold text-slate-800">{santri.namaLengkap}</td>
                                <td className="p-5 text-sm font-medium text-slate-700">{santri.sppBulanan}</td>
                                <td className="p-5 text-sm">
                                  {santri.pembayaran && santri.pembayaran.length > 0 ? (
                                    <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-emerald-50 text-emerald-700 border border-emerald-200">
                                      <CheckCircle2 size={14} className="mr-1" /> {santri.pembayaran[0].status}
                                    </span>
                                  ) : (
                                    <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-amber-50 text-amber-700 border border-amber-200">
                                      <Clock size={14} className="mr-1" /> Belum
                                    </span>
                                  )}
                                </td>
                              </React.Fragment>
                            )}
                            <td className="p-5 text-center">
                              <button 
                                onClick={() => setSelectedSantri(santri)}
                                className="p-2 text-emerald-600 hover:bg-emerald-100 rounded-xl transition-all inline-flex sm:opacity-0 group-hover:opacity-100"
                              >
                                <ChevronRight size={20} />
                              </button>
                            </td>
                          </tr>
                        ))}
                        {filteredSantri.length === 0 && (
                          <tr>
                            <td colSpan="6" className="p-12 text-center text-slate-500">
                              <div className="flex flex-col items-center justify-center">
                                <Users size={40} className="text-slate-300 mb-3" />
                                <p className="font-medium text-slate-600">Tidak ada data santri ditemukan.</p>
                              </div>
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* VIEW: TABEL PENGAJAR */}
              {activeMenu === 'pengajar' && !selectedPengajar && (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-fade-in">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse min-w-[800px]">
                      <thead>
                        <tr className="bg-slate-50/80 border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider">
                          <th className="p-5 font-semibold">ID / NUPTK</th>
                          <th className="p-5 font-semibold">Nama Lengkap</th>
                          <th className="p-5 font-semibold">Jabatan & Tugas</th>
                          <th className="p-5 font-semibold">Kontak</th>
                          <th className="p-5 font-semibold text-center">Aksi</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredPengajar.map((pengajar) => (
                          <tr key={pengajar.id} className="border-b border-slate-100 hover:bg-emerald-50/30 transition-colors group">
                            <td className="p-5 text-sm font-medium text-slate-500">
                              <span className="block">{pengajar.id}</span>
                              <span className="text-xs text-slate-400">NUPTK: {pengajar.nuptk}</span>
                            </td>
                            <td className="p-5 text-sm font-bold text-slate-800">{pengajar.namaLengkap}</td>
                            <td className="p-5 text-sm text-slate-600">
                              <span className="block font-medium">{pengajar.kepegawaian.jabatan}</span>
                              <span className="text-xs text-emerald-600 font-semibold">{pengajar.kepegawaian.musyrifHalaqoh}</span>
                            </td>
                            <td className="p-5 text-sm text-slate-600">
                              <span className="block font-medium text-slate-700">{pengajar.kontak.wa}</span>
                              <span className="text-xs text-slate-500">{pengajar.kontak.email}</span>
                            </td>
                            <td className="p-5 text-center">
                              <button 
                                onClick={() => setSelectedPengajar(pengajar)}
                                className="p-2 text-emerald-600 hover:bg-emerald-100 rounded-xl transition-all inline-flex sm:opacity-0 group-hover:opacity-100"
                              >
                                <ChevronRight size={20} />
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* VIEW: DETAIL SANTRI (SLIDE IN OVERLAY) */}
              {selectedSantri && (
                <div className="absolute inset-0 bg-white z-20 flex flex-col animate-slide-in-right rounded-tl-2xl shadow-2xl overflow-hidden">
                  <div className="p-4 lg:p-8 border-b border-slate-200 flex items-start justify-between bg-white relative z-10">
                    <div className="flex flex-col sm:flex-row sm:items-center space-y-4 sm:space-y-0 sm:space-x-6">
                      <div className="w-20 h-20 lg:w-24 lg:h-24 bg-slate-100 rounded-2xl shadow-inner flex items-center justify-center overflow-hidden border border-slate-200 shrink-0">
                        <UserCircle size={60} className="text-slate-300" />
                      </div>
                      <div>
                        <div className="flex flex-wrap items-center gap-3 mb-1">
                          <h2 className="text-2xl lg:text-3xl font-bold text-slate-800">{selectedSantri.namaLengkap}</h2>
                          <span className="px-3 py-1 rounded-full text-xs font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 uppercase tracking-wider">
                            {selectedSantri.status}
                          </span>
                        </div>
                        <div className="flex flex-wrap gap-y-2 gap-x-4 text-sm text-slate-500 mt-2 font-medium">
                          <span className="flex items-center"><MapPin size={16} className="mr-1.5 text-slate-400"/> ID: {selectedSantri.id}</span>
                          <span className="flex items-center"><GraduationCap size={16} className="mr-1.5 text-slate-400"/> {selectedSantri.kelas}</span>
                          <span className="flex items-center"><Users size={16} className="mr-1.5 text-slate-400"/> {selectedSantri.halaqoh}</span>
                        </div>
                      </div>
                    </div>
                    <div className="flex gap-2">
                       {/* Tombol Edit Santri MENGARAH KE santriform.html beserta parameter ID */}
                       <button onClick={() => window.location.href = `santriform.html?id=${selectedSantri.id}&mode=edit`} className="hidden sm:block p-2 text-blue-500 hover:text-white hover:bg-blue-600 rounded-xl transition-colors bg-blue-50 border border-blue-100 shadow-sm" title="Edit Data">
                         <EditIcon size={20} />
                       </button>
                       <button onClick={() => handleDeleteData("Santri", selectedSantri.id)} className="hidden sm:block p-2 text-red-500 hover:text-white hover:bg-red-600 rounded-xl transition-colors bg-red-50 border border-red-100 shadow-sm" title="Hapus Data">
                         <AlertTriangle size={20} />
                       </button>
                       <button onClick={() => setSelectedSantri(null)} className="p-2 text-slate-400 hover:text-slate-800 hover:bg-slate-100 rounded-xl transition-colors bg-white border border-slate-200 shadow-sm">
                         <X size={24} />
                       </button>
                    </div>
                  </div>
                  <DetailTabs santri={selectedSantri} />
                </div>
              )}

              {/* VIEW: DETAIL PENGAJAR (SLIDE IN OVERLAY) */}
              {selectedPengajar && (
                <div className="absolute inset-0 bg-white z-20 flex flex-col animate-slide-in-right rounded-tl-2xl shadow-2xl overflow-hidden">
                  <div className="p-4 lg:p-8 border-b border-slate-200 flex items-start justify-between bg-white relative z-10">
                    <div className="flex flex-col sm:flex-row sm:items-center space-y-4 sm:space-y-0 sm:space-x-6">
                      <div className="w-20 h-20 lg:w-24 lg:h-24 bg-slate-100 rounded-2xl shadow-inner flex items-center justify-center overflow-hidden border border-slate-200 shrink-0">
                        <Briefcase size={60} className="text-slate-300" />
                      </div>
                      <div>
                        <div className="flex flex-wrap items-center gap-3 mb-1">
                          <h2 className="text-2xl lg:text-3xl font-bold text-slate-800">{selectedPengajar.namaLengkap}</h2>
                          <span className="px-3 py-1 rounded-full text-xs font-bold bg-blue-50 text-blue-700 border border-blue-200 uppercase tracking-wider">
                            {selectedPengajar.kepegawaian.jabatan || 'Pengajar'}
                          </span>
                        </div>
                        <div className="flex flex-wrap gap-y-2 gap-x-4 text-sm text-slate-500 mt-2 font-medium">
                          <span className="flex items-center"><MapPin size={16} className="mr-1.5 text-slate-400"/> ID: {selectedPengajar.id}</span>
                          <span className="flex items-center"><UserCircle size={16} className="mr-1.5 text-slate-400"/> L/P: {selectedPengajar.jenisKelamin}</span>
                        </div>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => setSelectedPengajar(null)} className="p-2 text-slate-400 hover:text-slate-800 hover:bg-slate-100 rounded-xl transition-colors bg-white border border-slate-200 shadow-sm">
                        <X size={24} />
                      </button>
                    </div>
                  </div>
                  <DetailPengajarTabs pengajar={selectedPengajar} />
                </div>
              )}

            </div>
          </main>

          {/* ========================================= */}
          {/* CUSTOM DIALOG / MESSAGE BOX */}
          {/* ========================================= */}
          {dialog.isOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-zoom-in">
                <div className={`p-6 border-b ${dialog.type === 'error' ? 'border-red-100 bg-red-50' : dialog.type === 'confirm' ? 'border-amber-100 bg-amber-50' : 'border-emerald-100 bg-emerald-50'}`}>
                  <div className="flex items-center space-x-3">
                    {dialog.type === 'error' ? <AlertTriangle className="text-red-500" size={24} /> : 
                     dialog.type === 'confirm' ? <AlertTriangle className="text-amber-500" size={24} /> : 
                     <CheckCircle2 className="text-emerald-500" size={24} />}
                    <h3 className={`text-lg font-bold ${dialog.type === 'error' ? 'text-red-800' : dialog.type === 'confirm' ? 'text-amber-800' : 'text-emerald-800'}`}>
                      {dialog.title}
                    </h3>
                  </div>
                </div>
                <div className="p-6">
                  <p className="text-slate-600">{dialog.message}</p>
                </div>
                <div className="p-4 border-t border-slate-100 flex justify-end space-x-3 bg-slate-50">
                  {dialog.type === 'confirm' && (
                    <button onClick={closeDialog} className="px-4 py-2 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-200 transition-colors">
                      Batal
                    </button>
                  )}
                  <button 
                    onClick={() => {
                      if (dialog.onConfirm) dialog.onConfirm();
                      closeDialog();
                    }} 
                    className={`px-4 py-2 rounded-xl text-sm font-semibold text-white transition-colors shadow-sm ${
                      dialog.type === 'error' ? 'bg-red-600 hover:bg-red-700' : 
                      dialog.type === 'confirm' ? 'bg-amber-600 hover:bg-amber-700' : 'bg-emerald-600 hover:bg-emerald-700'
                    }`}
                  >
                    {dialog.type === 'confirm' ? 'Ya, Lanjutkan' : 'Mengerti'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // SUB-COMPONENTS DETAILS
    // ==========================================
    function DetailTabs({ santri }) {
      const [activeTab, setActiveTab] = useState('data-santri');
      const tabs = [
        { id: 'data-santri', label: 'Data Santri', icon: FileText },
        { id: 'akademik', label: 'Akademik', icon: GraduationCap },
        { id: 'ortu', label: 'Informasi Wali', icon: Users }
      ];

      return (
        <div className="flex-1 flex flex-col bg-slate-50 overflow-hidden">
          <div className="flex px-4 lg:px-8 border-b border-slate-200 space-x-2 lg:space-x-8 bg-white pt-4 overflow-x-auto no-scrollbar">
            {tabs.map(tab => (
              <button
                key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex items-center space-x-2 pb-4 border-b-2 transition-colors whitespace-nowrap px-2 ${
                  activeTab === tab.id ? 'border-emerald-600 text-emerald-600 font-bold' : 'border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300 font-medium'
                }`}
              >
                <tab.icon size={18} /><span>{tab.label}</span>
              </button>
            ))}
          </div>

          <div className="flex-1 overflow-y-auto p-4 lg:p-8">
            {activeTab === 'data-santri' && (
              <div className="max-w-5xl space-y-6 lg:space-y-8 animate-fade-in">
                 <div>
                  <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center">Identitas Utama</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <InfoItem label="NIPD" value={santri.nipd} />
                    <InfoItem label="NISN" value={santri.nisn} />
                    <InfoItem label="Nama Lengkap" value={santri.namaLengkap} />
                    <InfoItem label="Jenis Kelamin" value={santri.jenisKelamin} />
                    <InfoItem label="Tempat, Tgl Lahir" value={santri.ttl} />
                    <InfoItem label="NIK" value={santri.nik} />
                    <InfoItem label="Agama" value={santri.agama} />
                    <InfoItem label="Tahun Masuk" value={santri.tahunMasuk} />
                    <InfoItem label="Status Dapodik" value={santri.dapodik} />
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'ortu' && (
              <div className="max-w-5xl space-y-6 animate-fade-in">
                 <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                  <h3 className="text-md font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Alamat & Kontak Santri</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div className="col-span-1 lg:col-span-3"><InfoItem label="Alamat Lengkap" value={santri.kontak?.alamat} /></div>
                    <InfoItem label="Desa" value={santri.kontak?.desa} />
                    <InfoItem label="Kecamatan" value={santri.kontak?.kecamatan} />
                    <InfoItem label="No WA Santri" value={santri.kontak?.wa} />
                  </div>
                </div>
                 <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                      <h3 className="text-md font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Data Ayah</h3>
                      <div className="grid grid-cols-2 gap-5">
                        <div className="col-span-2"><InfoItem label="Nama Lengkap" value={santri.keluarga?.ayah?.nama} /></div>
                        <div className="col-span-2"><InfoItem label="Pekerjaan" value={santri.keluarga?.ayah?.pekerjaan} /></div>
                        <div className="col-span-2"><InfoItem label="Nomor WA" value={santri.keluarga?.ayah?.hp} /></div>
                      </div>
                    </div>
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                      <h3 className="text-md font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Data Ibu</h3>
                      <div className="grid grid-cols-2 gap-5">
                        <div className="col-span-2"><InfoItem label="Nama Lengkap" value={santri.keluarga?.ibu?.nama} /></div>
                        <div className="col-span-2"><InfoItem label="Pekerjaan" value={santri.keluarga?.ibu?.pekerjaan} /></div>
                        <div className="col-span-2"><InfoItem label="Nomor WA" value={santri.keluarga?.ibu?.hp} /></div>
                      </div>
                    </div>
                 </div>
              </div>
            )}

            {activeTab === 'akademik' && (
              <div className="max-w-5xl space-y-6 animate-fade-in">
                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                  <h3 className="text-md font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Data Sekolah Asal</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                     <InfoItem label="Nama Sekolah Asal" value={santri.asalSekolah?.nama} />
                     <InfoItem label="NPSN" value={santri.asalSekolah?.npsn} />
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function DetailPengajarTabs({ pengajar }) {
      return (
        <div className="flex-1 flex flex-col bg-slate-50 p-8 overflow-hidden">
          <p className="text-slate-500">Detail tenaga pengajar (WIP)...</p>
        </div>
      );
    }

    function InfoItem({ label, value }) {
      return (
        <div className="flex flex-col">
          <span className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1.5">{label}</span>
          <span className="text-sm font-bold text-slate-800">{value || '-'}</span>
        </div>
      );
    }

    // Render Aplikasi
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
